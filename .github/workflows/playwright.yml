name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  
  # Manual Trigger: Permits ad-hoc manual execution from the GitHub Actions dashboard
  workflow_dispatch:

  # Scheduled Trigger: Automatically runs the suite every Monday at 1:00 PM UTC
  schedule:
    - cron: '0 13 * * 1'

jobs:
  test:
    timeout-minutes: 60
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v5
    
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test
      
    # Allure Processing: Standardized to use allure-commandline for strict compliance
    - name: Generate Allure Report
      if: always()
      run: npx allure-commandline generate allure-results --clean -o allure-report
      
    # Artifact Archival: Uploads the compiled Allure report folder for distribution
    - name: Upload Allure Report Artifact
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: allure-report-dashboard
        path: allure-report/
        retention-days: 30